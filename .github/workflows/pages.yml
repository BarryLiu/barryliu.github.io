name: Deploy Astro site to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            printf '%s' '${{ secrets.AUTH_COOKIE_SECRET }}' | wrangler pages secret put AUTH_COOKIE_SECRET --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            printf '%s' '${{ secrets.CF_GITHUB_OAUTH_CLIENT_ID }}' | wrangler pages secret put CF_GITHUB_OAUTH_CLIENT_ID --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            printf '%s' '${{ secrets.CF_GITHUB_OAUTH_CLIENT_SECRET }}' | wrangler pages secret put CF_GITHUB_OAUTH_CLIENT_SECRET --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            wrangler pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
