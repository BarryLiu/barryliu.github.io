name: Deploy Astro site to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set Cloudflare Secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_PROJECT_NAME AUTH_COOKIE_SECRET GITHUB_OAUTH_CLIENT_ID GITHUB_OAUTH_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured in GitHub Actions secrets"
              exit 1
            fi
          done

          printf '%s' "$AUTH_COOKIE_SECRET" | npx wrangler pages secret put AUTH_COOKIE_SECRET --project-name="$CLOUDFLARE_PROJECT_NAME"
          printf '%s' "$GITHUB_OAUTH_CLIENT_ID" | npx wrangler pages secret put GITHUB_OAUTH_CLIENT_ID --project-name="$CLOUDFLARE_PROJECT_NAME"
          printf '%s' "$GITHUB_OAUTH_CLIENT_SECRET" | npx wrangler pages secret put GITHUB_OAUTH_CLIENT_SECRET --project-name="$CLOUDFLARE_PROJECT_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID || secrets.CF_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.GITHUB_OAUTH_CLIENT_SECRET || secrets.CF_GITHUB_OAUTH_CLIENT_SECRET }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
