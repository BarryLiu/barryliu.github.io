# Local Astro development environment.
# Usage:
#   docker compose up
#   docker compose run --rm astro npm run build
services:
  astro:
    image: node:22-alpine
    container_name: astro-blog
    working_dir: /app
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - astro_node_modules:/app/node_modules
    environment:
      ASTRO_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev"

volumes:
  astro_node_modules:
